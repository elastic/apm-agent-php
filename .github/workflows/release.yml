---
name: release

permissions:
  contents: read

on:
  workflow_dispatch: ~
  push:
    tags: [ "v[0-9]+*" ]
    branches:
      - main

env:
  BUILD_PACKAGES: build/packages

jobs:

  build:
    uses: ./.github/workflows/build.yml
    with:
      build_arch: x86_64

  build-packages:
    permissions:
      contents: read
      packages: read
    needs:
      - build
    uses: ./.github/workflows/build-packages.yml

  release:
    needs:
      - build-packages
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GITHUB_TOKEN: ${{ github.token }}
      TAG_NAME: v1.16.20
    steps:
      - uses: actions/checkout@v6

      - name: Download package artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: packages-*
          path: ${{ env.BUILD_PACKAGES }}

      - name: Moving packages out of folders
        run: |
          pushd ${{ env.BUILD_PACKAGES }}
          find . -mindepth 2 -type f -exec mv -t . {} +
          find . -mindepth 1 -maxdepth 1 -type d -exec rm -r {} +
          popd
          ls -R ${{ env.BUILD_PACKAGES }}

      - name: Create GitHub release
        run: |
          gh release create "${TAG_NAME}" \
            --title "${TAG_NAME}" \
            --notes "Ecentria fork release. Changes from upstream v1.16.0:
          - Add configurable max send queue size (#1441)
          - Fix span ID collisions: use random_bytes() instead of mt_rand() (#1443)" \
            --repo ${{ github.repository }} \
            ${{ env.BUILD_PACKAGES }}/*.*
